<svg viewBox="0 0 820 175" width="820" height="175" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#04040e"/>
    <stop offset="100%" stop-color="#080816"/>
  </linearGradient>
  <filter id="ng" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="1.6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r=".6" fill="rgba(255,255,255,.03)"/>
  </pattern>
</defs>

<rect width="820" height="175" fill="url(#bg)"/>
<rect width="820" height="175" fill="url(#dots)"/>

<!-- Left accent bar -->
<rect x="0" y="0" width="3" height="175" fill="#cc1a1a" opacity=".75"/>

<!-- ===== NAME ===== -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".65s" begin=".3s" fill="freeze"/>
  <animateTransform attributeName="transform" type="translate" from="0,12" to="0,0" dur=".65s" begin=".3s" fill="freeze"/>
  <text x="22" y="64"
        font-family="'Arial Black',Impact,sans-serif"
        font-size="44" font-weight="900" letter-spacing="-1"
        fill="white" filter="url(#ng)">BARAN ERDOGAN</text>
</g>

<!-- Red accent bar -->
<rect x="22" y="75" height="2.5" rx="1.2" fill="#cc1a1a" width="0">
  <animate attributeName="width" from="0" to="348" dur=".45s" begin=".95s" fill="freeze"/>
</rect>

<!-- Subtitle 1 -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".6s" fill="freeze"/>
  <text x="22" y="95"
        font-family="Arial,Helvetica,sans-serif"
        font-size="10" letter-spacing="3" font-weight="400"
        fill="rgba(255,255,255,.42)">MSc BUSINESS ANALYTICS  ·  ESADE BUSINESS SCHOOL</text>
</g>

<!-- Subtitle 2 -->
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".6s" begin=".78s" fill="freeze"/>
  <text x="22" y="113"
        font-family="Arial,Helvetica,sans-serif"
        font-size="9" letter-spacing="2.5" font-weight="400"
        fill="rgba(255,255,255,.24)">INDUSTRIAL ENGINEERING  ·  PURDUE UNIVERSITY</text>
</g>

<!-- ===== RIGHT: DATA SPARKLINE ===== -->
<!-- Axis lines -->
<line x1="542" y1="32" x2="542" y2="132" stroke="rgba(255,255,255,.06)" stroke-width="1" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".3s" begin=".9s" fill="freeze"/>
</line>
<line x1="542" y1="132" x2="792" y2="132" stroke="rgba(255,255,255,.06)" stroke-width="1" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".3s" begin=".9s" fill="freeze"/>
</line>

<!-- "DATA SIGNAL" label -->
<text x="542" y="27"
      font-family="Arial,Helvetica,sans-serif"
      font-size="7" letter-spacing="2.5"
      fill="rgba(255,255,255,.15)" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".3s" begin="1.0s" fill="freeze"/>
  DATA SIGNAL
</text>

<!-- Sparkline path — 15 points, path length ≈ 458px -->
<polyline
  points="548,118 565,88 582,104 599,62 616,82 633,48 650,70 667,58 684,88 701,65 718,104 735,78 752,92 769,52 786,80"
  fill="none"
  stroke="rgba(204,26,26,.40)"
  stroke-width="1.8"
  stroke-linecap="round"
  stroke-linejoin="round"
  stroke-dasharray="465"
  stroke-dashoffset="465">
  <animate attributeName="stroke-dashoffset" from="465" to="0" dur="1.3s" begin="1.0s" fill="freeze"/>
</polyline>

<!-- Fill area below sparkline -->
<path
  d="M548,132 L548,118 L565,88 L582,104 L599,62 L616,82 L633,48 L650,70 L667,58 L684,88 L701,65 L718,104 L735,78 L752,92 L769,52 L786,80 L786,132 Z"
  fill="rgba(204,26,26,.05)" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".5s" begin="2.3s" fill="freeze"/>
</path>

<!-- Highlighted data points (local peaks) -->
<circle cx="633" cy="48" r="3" fill="#cc1a1a" opacity="0">
  <animate attributeName="opacity" from="0" to=".85" dur=".2s" begin="1.55s" fill="freeze"/>
</circle>
<circle cx="667" cy="58" r="3" fill="#cc1a1a" opacity="0">
  <animate attributeName="opacity" from="0" to=".85" dur=".2s" begin="1.68s" fill="freeze"/>
</circle>
<circle cx="769" cy="52" r="3" fill="#cc1a1a" opacity="0">
  <animate attributeName="opacity" from="0" to=".85" dur=".2s" begin="1.95s" fill="freeze"/>
</circle>

<!-- Pulse on last point (786,80) — live indicator -->
<circle cx="786" cy="80" r="3.5" fill="none" stroke="#cc1a1a" stroke-width="1" opacity="0">
  <animate attributeName="r"       values="3.5;3.5;8;13"   keyTimes="0;0;.35;1" dur="2.2s" begin="3.2s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;0;.5;0"        keyTimes="0;0;.35;1" dur="2.2s" begin="3.2s" repeatCount="indefinite"/>
</circle>
<circle cx="786" cy="80" r="3.5" fill="#cc1a1a" opacity="0">
  <animate attributeName="opacity" from="0" to=".9" dur=".2s" begin="2.3s" fill="freeze"/>
</circle>

<!-- ===== FOOTER ===== -->
<line x1="22" y1="155" x2="22" y2="155" stroke="rgba(255,255,255,.07)" stroke-width="1">
  <animate attributeName="x2" from="22" to="798" dur=".55s" begin="1.3s" fill="freeze"/>
</line>
<g opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur=".5s" begin="1.5s" fill="freeze"/>
  <text x="22" y="167"
        font-family="Arial,Helvetica,sans-serif"
        font-size="7" letter-spacing="2.2"
        fill="rgba(255,255,255,.15)">PYTHON  ·  SQL  ·  R  ·  AWS  ·  SAGEMAKER  ·  POSTGRESQL  ·  XGBOOST</text>
</g>

</svg>
